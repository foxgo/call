server:
  port: 8081

spring:
  application:
    name: call-ingestion
  threads:
    virtual:
      enabled: true
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:call-producer-group}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

call:
  rocketmq:
    name-server: ${ROCKETMQ_NAME_SERVER:localhost:9876}
    producer-group: ${ROCKETMQ_PRODUCER_GROUP:call-producer-group}
    topics:
      record-ingest: ${CALL_RECORD_INGEST_TOPIC:call_record_ingest}
      round-ingest: ${CALL_ROUND_INGEST_TOPIC:call_round_ingest}
      record-dlq: ${CALL_RECORD_DLQ_TOPIC:call_record_dlq}
      round-dlq: ${CALL_ROUND_DLQ_TOPIC:call_round_dlq}
    consumers:
      record:
        group: ${CALL_RECORD_CONSUMER_GROUP:call-record-consumer-group}
        consume-thread-max: ${CALL_RECORD_CONSUMER_THREADS:6}
      round:
        group: ${CALL_ROUND_CONSUMER_GROUP:call-round-consumer-group}
        consume-thread-max: ${CALL_ROUND_CONSUMER_THREADS:6}
      index:
        group: ${CALL_INDEX_CONSUMER_GROUP:call-index-group}
        consume-thread-max: ${CALL_INDEX_CONSUMER_THREADS:2}
      ai:
        group: ${CALL_AI_CONSUMER_GROUP:call-ai-group}
        consume-thread-max: ${CALL_AI_CONSUMER_THREADS:2}
      third-party:
        group: ${CALL_THIRD_PARTY_CONSUMER_GROUP:call-third-party-group}
        consume-thread-max: ${CALL_THIRD_PARTY_CONSUMER_THREADS:2}
  outbox:
    batch-size: ${CALL_OUTBOX_BATCH_SIZE:100}
    poll-interval: ${CALL_OUTBOX_POLL_INTERVAL:PT5S}
    retry-backoff: ${CALL_OUTBOX_RETRY_BACKOFF:PT30S}
    processing-timeout: ${CALL_OUTBOX_PROCESSING_TIMEOUT:PT5M}
  postprocess:
    topics:
      record-persisted: ${CALL_RECORD_PERSISTED_TOPIC:call_record_persisted}
  shard:
    db-count: ${CALL_DB_COUNT:4}
    table-count: ${CALL_TABLE_COUNT:16}
  id:
    machine-id: ${CALL_MACHINE_ID:1}
    epoch: ${CALL_ID_EPOCH:1700000000000}
  datasource:
    nodes:
      - index: 0
        host: ${MYSQL_HOST:localhost}
        port: ${MYSQL_PORT:3306}
        database: call_0
        username: ${MYSQL_USER:call}
        password: ${MYSQL_PASSWORD:call123}
      - index: 1
        host: ${MYSQL_HOST:localhost}
        port: ${MYSQL_PORT:3306}
        database: call_1
        username: ${MYSQL_USER:call}
        password: ${MYSQL_PASSWORD:call123}
      - index: 2
        host: ${MYSQL_HOST:localhost}
        port: ${MYSQL_PORT:3306}
        database: call_2
        username: ${MYSQL_USER:call}
        password: ${MYSQL_PASSWORD:call123}
      - index: 3
        host: ${MYSQL_HOST:localhost}
        port: ${MYSQL_PORT:3306}
        database: call_3
        username: ${MYSQL_USER:call}
        password: ${MYSQL_PASSWORD:call123}
  elasticsearch:
    uris:
      - ${ES_URI:http://localhost:9200}
    username: ${ES_USERNAME:elastic}
    password: ${ES_PASSWORD:elastic123}
    auto-init: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-},%X{spanId:-}] %logger{36} - %msg%n"
