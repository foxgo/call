services:
  mysql:
    image: mysql:8.4
    container_name: call-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_USER: call
      MYSQL_PASSWORD: call123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command:
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: call-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rocketmq-nameserver:
    image: apache/rocketmq:5.3.2
    container_name: call-rocketmq-nameserver
    ports:
      - "9876:9876"
    command: ["sh", "mqnamesrv"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9876"]
      interval: 15s
      timeout: 10s
      retries: 12

  rocketmq-broker:
    image: apache/rocketmq:5.3.2
    container_name: call-rocketmq-broker
    depends_on:
      rocketmq-nameserver:
        condition: service_healthy
    environment:
      NAMESRV_ADDR: rocketmq-nameserver:9876
    ports:
      - "10911:10911"
      - "10909:10909"
    command: ["sh", "mqbroker", "-n", "rocketmq-nameserver:9876", "--enable-proxy"]
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 10911"]
      interval: 15s
      timeout: 10s
      retries: 12

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: call-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: elastic123
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:elastic123 http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 15s
      timeout: 10s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: call-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: elastic123
    ports:
      - "5601:5601"

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: call-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/rules:/etc/prometheus/rules:ro

  grafana:
    image: grafana/grafana:10.4.2
    container_name: call-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  call-ingestion:
    build:
      context: ..
      dockerfile: call-ingestion/Dockerfile
    container_name: call-ingestion
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-nameserver:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      ROCKETMQ_NAME_SERVER: rocketmq-nameserver:9876
      REDIS_HOST: redis
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: call
      MYSQL_PASSWORD: call123
      ES_URI: http://elasticsearch:9200
      ES_USERNAME: elastic
      ES_PASSWORD: elastic123
    ports:
      - "8081:8081"

  call-search:
    build:
      context: ..
      dockerfile: call-search/Dockerfile
    container_name: call-search
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: call
      MYSQL_PASSWORD: call123
      ES_URI: http://elasticsearch:9200
      ES_USERNAME: elastic
      ES_PASSWORD: elastic123
    ports:
      - "8082:8082"

  call-task:
    build:
      context: ..
      dockerfile: call-task/Dockerfile
    container_name: call-task
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-nameserver:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      ROCKETMQ_NAME_SERVER: rocketmq-nameserver:9876
      REDIS_HOST: redis
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: call
      MYSQL_PASSWORD: call123
      ES_URI: http://elasticsearch:9200
      ES_USERNAME: elastic
      ES_PASSWORD: elastic123
    ports:
      - "8084:8084"

  call-iam:
    build:
      context: ..
      dockerfile: call-iam/Dockerfile
    container_name: call-iam
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-nameserver:
        condition: service_healthy
      rocketmq-broker:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      ROCKETMQ_NAME_SERVER: rocketmq-nameserver:9876
      REDIS_HOST: redis
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: call
      MYSQL_PASSWORD: call123
      ES_URI: http://elasticsearch:9200
      ES_USERNAME: elastic
      ES_PASSWORD: elastic123
    ports:
      - "8085:8085"

volumes:
  mysql-data:
  es-data:
