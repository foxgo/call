global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: call-ingestion
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["call-ingestion:8081"]
  - job_name: call-search
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["call-search:8082"]
  - job_name: call-task
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["call-task:8084"]
