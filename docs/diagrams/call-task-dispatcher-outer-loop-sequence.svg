<rect x="180" y="140" width="1320" height="620" rx="8" fill="none" stroke="#93c5fd" stroke-width="1" stroke-dasharray="8 4"/>
<text x="840" y="450" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#1e3a8a">loop partition in ownedPartitions()</text>
