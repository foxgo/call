<rect x="40" y="810" width="860" height="80" fill="#eff6ff" stroke="#60a5fa" stroke-width="1"/>
<text x="470" y="850" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#0f172a">这张图只保留 dispatcher 负责的控制流：分区遍历、每分区限流、worker 返回 false 时中断内层循环。</text>
<line x1="128" y1="190" x2="348" y2="190" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow-block)" style="color: #1d4ed8" fill="none"/>
<text x="238" y="184" text-anchor="middle" dominant-baseline="auto" font-size="11" fill="#000000">@Scheduled dispatchOwnedPartitions()</text>
<line x1="348" y1="300" x2="568" y2="300" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow-block)" style="color: #1d4ed8" fill="none"/>
<text x="458" y="294" text-anchor="middle" dominant-baseline="auto" font-size="11" fill="#000000">ownedPartitions()</text>
<line x1="568" y1="360" x2="348" y2="360" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-block)" style="color: #475569" fill="none"/>
<text x="458" y="354" text-anchor="middle" dominant-baseline="auto" font-size="11" fill="#000000">owned partitions</text>
<line x1="348" y1="440" x2="788" y2="440" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow-block)" style="color: #1d4ed8" fill="none"/>
<text x="568" y="434" text-anchor="middle" dominant-baseline="auto" font-size="11" fill="#000000">runPartition(partition)</text>
<line x1="788" y1="530" x2="348" y2="530" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-block)" style="color: #475569" fill="none"/>
<text x="568" y="524" text-anchor="middle" dominant-baseline="auto" font-size="11" fill="#000000">false -&gt; break / true -&gt; continue</text>
<line x1="348" y1="620" x2="788" y2="620" stroke="#1d4ed8" stroke-width="2" marker-end="url(#arrow-block)" style="color: #1d4ed8" fill="none"/>
<text x="568" y="614" text-anchor="middle" dominant-baseline="auto" font-size="11" fill="#000000">next runPartition(partition)</text>
<line x1="788" y1="680" x2="348" y2="680" stroke="#475569" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow-block)" style="color: #475569" fill="none"/>
<text x="568" y="674" text-anchor="middle" dominant-baseline="auto" font-size="11" fill="#000000">until limit or no work</text>
</svg>